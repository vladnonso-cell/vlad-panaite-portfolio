<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vlad Panaite | Data Visualization</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="canvas-container"></div>

  <div class="ui-overlay">
    <header>
      <div class="logo">VP</div>
      <nav>
        <a href="#sound-design" class="nav-link">Sound Design</a>
        <a href="#composition" class="nav-link">Composition</a>
        <a href="#contact" class="nav-link">Contact</a>
      </nav>
    </header>

    <div class="info-panel">
      <div class="info-content">
        <h1 class="title">VLAD PANAITE</h1>
        <p class="subtitle">Sound Designer & Composer</p>
        <p class="description">Interactive audio design, composition, and sonic environments</p>

        <div class="interactive-zones">
          <div class="zone zone-1" data-info="Sound Design | Games & Interactive | 3 Projects">
            <span class="zone-label">SOUND DESIGN</span>
          </div>
          <div class="zone zone-2" data-info="Composition | Original Music | .Pierrot. Project">
            <span class="zone-label">COMPOSITION</span>
          </div>
          <div class="zone zone-3" data-info="Based in London & Rome | Available for Commissions">
            <span class="zone-label">CONTACT</span>
          </div>
        </div>
      </div>

      <div class="tooltip">
        <div class="tooltip-content"></div>
      </div>
    </div>

    <div class="data-stream" id="dataStream"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
